name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag. Leave empty to use package.json version."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        default: false
        type: boolean
  push:
    branches:
      - "release-*"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Typecheck and test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  package:
    name: Package ${{ matrix.platform }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: win
            os: windows-latest
          - platform: mac
            os: macos-latest
          - platform: linux
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Package
        run: npm run dist -- --platform ${{ matrix.platform }}

      - name: Verify macOS application signatures
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r -d '' app; do
            codesign --verify --deep --strict --verbose=4 "$app"
            found=1
          done < <(find dist -type d -name '*.app' -prune -print0)
          if [[ $found -eq 0 ]]; then
            echo "No macOS application bundles were produced." >&2
            exit 1
          fi

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Javdex-${{ matrix.platform }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
            dist/*.yml
            dist/*.yaml
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: package
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            tag="${{ inputs.release_tag }}"
          else
            version="$(node -p "require('./package.json').version")"
            tag="v${version}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Javdex ${{ steps.release.outputs.tag }}
          prerelease: ${{ inputs.prerelease || false }}
          fail_on_unmatched_files: false
          files: |
            release-artifacts/*.AppImage
            release-artifacts/*.deb
            release-artifacts/*.dmg
            release-artifacts/*.exe
            release-artifacts/*.zip
            release-artifacts/*.blockmap
            release-artifacts/*.yml
            release-artifacts/*.yaml
